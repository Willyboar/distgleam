name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"

      - name: Run tests
        run: gleam test

      - name: Download dependencies
        run: gleam deps download

      - name: Patch gleepack for CI auth
        run: sh scripts/patch-gleepack.sh

      - name: Build all targets with gleepack
        run: gleam run -m gleepack build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
