name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"

      - name: Run tests
        run: gleam test

      - name: Build with gleepack
        run: gleam run -m gleepack build

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          cp dist/distgleam/aarch64-macos-otp-29.0.2/distgleam dist/distgleam-aarch64-macos 2>/dev/null || true
          cp dist/distgleam/amd64-linux-otp-29.0.2/distgleam dist/distgleam-amd64-linux 2>/dev/null || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
