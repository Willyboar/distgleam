name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: amd64-linux-otp-29.0
            gleepack-url: https://github.com/yoshi-monster/gleepack/releases/download/v1.0.1/amd64-linux-otp-29.0.zip
            asset-name: distgleam-amd64-linux
          - os: macos-latest
            target: aarch64-macos-otp-29.0
            gleepack-url: https://github.com/yoshi-monster/gleepack/releases/download/v1.0.1/aarch64-macos-otp-29.0.zip
            asset-name: distgleam-aarch64-macos
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"

      - name: Install gleepack
        run: |
          curl -sL -o /tmp/gleepack.zip "${{ matrix.gleepack-url }}"
          unzip -o /tmp/gleepack.zip -d /tmp/gleepack
          chmod +x /tmp/gleepack/gleepack
          sudo mv /tmp/gleepack/gleepack /usr/local/bin/gleepack

      - name: Run tests
        run: gleam test

      - name: Build with gleepack
        run: gleepack build --target="${{ matrix.target }}" --output="dist/${{ matrix.asset-name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
