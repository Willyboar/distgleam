name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"

      - name: Install gleepack
        run: |
          curl -sL -o /tmp/gleepack.zip https://github.com/yoshi-monster/gleepack/releases/download/v1.0.1/aarch64-macos-otp-29.0.zip
          unzip -o /tmp/gleepack.zip -d /tmp/gleepack
          chmod +x /tmp/gleepack/gleepack
          sudo mv /tmp/gleepack/gleepack /usr/local/bin/gleepack

      - name: Run tests
        run: gleam test

      - name: Build for macOS ARM64
        run: gleepack build --target="aarch64-macos-otp-29.0" --output="dist/distgleam-aarch64-macos"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
