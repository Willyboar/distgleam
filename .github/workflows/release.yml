name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"

      - name: Run tests
        run: gleam test

      - name: Pre-download gleepack runtimes
        run: |
          mkdir -p ~/.cache/gleepack/runtimes
          for url in \
            https://github.com/yoshi-monster/gleepack/releases/download/OTP-29.0.2/aarch64-macos-otp-29.0.2.zip \
            https://github.com/yoshi-monster/gleepack/releases/download/OTP-29.0.2/amd64-linux-otp-29.0.2.zip \
            https://github.com/yoshi-monster/gleepack/releases/download/OTP-29.0.2/aarch64-linux-otp-29.0.2.zip \
            https://github.com/yoshi-monster/gleepack/releases/download/OTP-29.0.2/amd64-win32-otp-29.0.2.zip; do
            name="${url##*/}"
            [ -f ~/.cache/gleepack/runtimes/"$name" ] || curl -sL -o ~/.cache/gleepack/runtimes/"$name" "$url"
          done

      - name: Build with gleepack
        run: gleam run -m gleepack build

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          for target_dir in dist/distgleam/*/; do
            slug=$(basename "$target_dir")
            case "$slug" in
              aarch64-macos*)  asset="distgleam-aarch64-macos"  ;;
              amd64-linux*)    asset="distgleam-amd64-linux"    ;;
              aarch64-linux*)  asset="distgleam-aarch64-linux"  ;;
              amd64-win32*)    asset="distgleam-amd64-win32"    ;;
              *)               asset="distgleam-$slug"          ;;
            esac
            cp "$target_dir/distgleam" "dist/$asset" 2>/dev/null || true
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
